<script>
const API_BASE = 'https://d5d34ggl6saovpdajhps.a6hc9vya.apigw.yandexcloud.net';
let token = localStorage.getItem('token');
let currentQuestions = [], currentAnswers = [], currentQIdx = 0;
let trainingQuestions = [], trainingAnswers = [];

async function api(endpoint, method, body, needAuth = true) {
  const headers = { 'Content-Type': 'application/json' };
  if (needAuth && token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(`${API_BASE}/${endpoint}`, {
    method, headers, body: body ? JSON.stringify(body) : undefined
  });
  // ★ ФИКС 1: не делаем reload на 401 — просто чистим токен и показываем модалку
  if (res.status === 401) {
    localStorage.removeItem('token');
    token = null;
    document.getElementById('appArea').classList.add('hidden');
    document.getElementById('landing').classList.remove('hidden');
    openModal('login');
    throw new Error('Сессия истекла, войдите снова');
  }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Ошибка');
  return data;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}

function showView(name) {
  ['test','result','training','errors'].forEach(v =>
    document.getElementById(`${v}-view`).classList.add('hidden'));
  document.getElementById(`${name}-view`).classList.remove('hidden');
  document.getElementById('appArea').classList.remove('hidden');
  document.getElementById('landing').classList.add('hidden');
  window.scrollTo(0, 0);
}

// ── modal ──
const authModal = document.getElementById('authModal');
function openModal(tab) {
  authModal.classList.add('open');
  if (tab) switchTab(tab);
}
function closeModal() { authModal.classList.remove('open'); }

document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
authModal.addEventListener('click', e => { if (e.target === authModal) closeModal(); });
document.querySelectorAll('.modal-tab').forEach(btn =>
  btn.addEventListener('click', () => switchTab(btn.dataset.tab)));

function switchTab(tab) {
  document.querySelectorAll('.modal-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
  document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
}

[document.getElementById('loginBtn'), document.getElementById('startBtn'),
 document.getElementById('heroStartBtn'), document.getElementById('heroLearnBtn')]
.forEach(btn => btn && btn.addEventListener('click', () => openModal('login')));
document.querySelectorAll('.open-modal-btn').forEach(btn =>
  btn.addEventListener('click', () => openModal('login')));

// ── auth ──
document.getElementById('doLoginBtn').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;
  const errDiv = document.getElementById('loginError');
  errDiv.classList.add('hidden');
  if (!email || !pass) { errDiv.textContent = 'Заполните все поля'; errDiv.classList.remove('hidden'); return; }
  try {
    const d = await api('user-login', 'POST', {email, password: pass}, false);
    token = d.token; localStorage.setItem('token', token);
    closeModal(); startDiagnostic();
  } catch(e) { errDiv.textContent = e.message; errDiv.classList.remove('hidden'); }
});

document.getElementById('doRegisterBtn').addEventListener('click', async () => {
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPassword').value;
  const errDiv = document.getElementById('regError');
  errDiv.classList.add('hidden');
  if (!email || !pass) { errDiv.textContent = 'Заполните все поля'; errDiv.classList.remove('hidden'); return; }
  try {
    const d = await api('register', 'POST', {email, password: pass}, false);
    token = d.token; localStorage.setItem('token', token);
    closeModal(); startDiagnostic();
  } catch(e) { errDiv.textContent = e.message; errDiv.classList.remove('hidden'); }
});

// ── test ──
async function startDiagnostic() {
  showView('test');
  try {
    const raw = await api('test', 'GET');
    // ★ ФИКС 2: options может прийти строкой — парсим на месте
    currentQuestions = raw.map(q => ({
      ...q,
      options: Array.isArray(q.options) ? q.options : JSON.parse(q.options)
    }));
    currentAnswers = []; currentQIdx = 0;
    renderQuestion();
  } catch(e) {
    if (!e.message.includes('истекла')) alert('Не удалось загрузить тест: ' + e.message);
  }
}

function renderQuestion() {
  if (currentQIdx >= currentQuestions.length) { submitTest(); return; }
  const q = currentQuestions[currentQIdx];
  document.getElementById('q-counter').textContent = `Вопрос ${currentQIdx+1} из ${currentQuestions.length}`;
  document.getElementById('q-progress-fill').style.width =
    Math.round((currentQIdx / currentQuestions.length) * 100) + '%';
  document.getElementById('q-topic').textContent = q.topic_name || '';
  document.getElementById('q-text').textContent = q.text;
  const optsDiv = document.getElementById('q-options');
  optsDiv.innerHTML = '';
  q.options.forEach((opt, i) => {
    const letter = String.fromCharCode(65+i);
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letter}</span>${esc(opt)}`;
    btn.onclick = () => {
      currentAnswers.push({ question_id: q.id, user_answer: letter });
      currentQIdx++;
      renderQuestion();
    };
    optsDiv.appendChild(btn);
  });
}

async function submitTest() {
  try {
    const res = await api('submit', 'POST', { answers: currentAnswers });
    showResult(res);
  } catch(e) { alert('Ошибка: ' + e.message); }
}

function showResult(res) {
  document.getElementById('result-level').textContent = res.level || '—';
  const container = document.getElementById('topic-scores');
  container.innerHTML = '';
  for (const [topic, score] of Object.entries(res.topic_scores || {})) {
    const pct = Math.round(score * 100);
    const color = pct < 60 ? '#F87171' : pct < 80 ? '#FFD600' : '#4ADE80';
    container.innerHTML += `
      <div class="topic-item">
        <div class="topic-header">
          <span class="topic-name">${esc(topic)}</span>
          <span class="topic-pct" style="color:${color}">${pct}%</span>
        </div>
        <div class="topic-bar"><div class="topic-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>`;
  }
  showView('result');
}

// ── training ──
async function startTraining(random = false) {
  try {
    const raw = await api(random ? 'training?random=true' : 'training', 'GET');
    // ★ ФИКС 2 тоже для training
    trainingQuestions = raw.map(q => ({
      ...q,
      options: Array.isArray(q.options) ? q.options : JSON.parse(q.options)
    }));
    trainingAnswers = new Array(trainingQuestions.length).fill(null);
    renderTraining(); showView('training');
  } catch(e) {
    if (!e.message.includes('истекла')) alert('Ошибка: ' + e.message);
  }
}

function renderTraining() {
  const c = document.getElementById('training-list');
  c.innerHTML = '';
  document.getElementById('training-result').classList.add('hidden');
  trainingQuestions.forEach((q, idx) => {
    const div = document.createElement('div');
    div.className = 'training-q';
    div.innerHTML = `<p><strong>${esc(q.text)}</strong></p>`;
    const optsDiv = document.createElement('div');
    optsDiv.className = 'training-opts';
    q.options.forEach((opt, oi) => {
      const letter = String.fromCharCode(65+oi);
      const btn = document.createElement('button');
      btn.className = 'training-opt';
      btn.textContent = `${letter}. ${opt}`;
      btn.onclick = () => {
        trainingAnswers[idx] = { question_id: q.id, user_answer: letter };
        optsDiv.querySelectorAll('.training-opt').forEach(b => b.classList.remove('sel'));
        btn.classList.add('sel');
      };
      optsDiv.appendChild(btn);
    });
    div.appendChild(optsDiv);
    c.appendChild(div);
  });
}

document.getElementById('submitTrainingBtn').addEventListener('click', async () => {
  if (trainingAnswers.some(a => !a)) { alert('Ответьте на все вопросы'); return; }
  try {
    const res = await api('training', 'POST', { answers: trainingAnswers });
    const correct = res.results.filter(r => r.correct).length;
    let html = `<div class="training-result-box"><p style="font-size:18px;font-weight:700;margin-bottom:14px">✅ Правильно: ${correct} из ${res.results.length}</p>`;
    if (res.results[0]?.explanation) {
      html += '<strong>Пояснения:</strong><ul>';
      res.results.forEach(r => { html += `<li>${esc(r.explanation)}</li>`; });
      html += '</ul>';
    }
    html += '</div>';
    const resultDiv = document.getElementById('training-result');
    resultDiv.innerHTML = html;
    resultDiv.classList.remove('hidden');
    resultDiv.scrollIntoView({ behavior: 'smooth' });
  } catch(e) { alert('Ошибка: ' + e.message); }
});

// ── errors ──
async function showErrors() {
  try {
    const errors = await api('errors', 'GET');
    const div = document.getElementById('errors-list');
    div.innerHTML = !errors.length
      ? '<p style="color:rgba(255,255,255,0.5)">✨ Нет ошибок — отличная работа!</p>'
      : errors.map(e => `
          <div class="error-item">
            <strong>${esc(e.question_text)}</strong>
            <span>Ваш ответ: ${esc(e.user_answer)}</span><br>
            <span class="correct">Правильно: ${esc(e.correct_answer_display)}</span>
          </div>`).join('');
    showView('errors');
  } catch(e) { alert('Ошибка: ' + e.message); }
}

// ── nav ──
document.getElementById('retestBtn').onclick = () => startDiagnostic();
document.getElementById('trainWeakBtn').onclick = () => startTraining(false);
document.getElementById('trainAllBtn').onclick = () => startTraining(true);
document.getElementById('skipTestBtn').onclick = () => startTraining(true);
document.getElementById('errorsBtn').onclick = () => showErrors();
document.getElementById('closeErrorsBtn').onclick = () => showView('result');
document.getElementById('backToResultBtn').onclick = () => showView('result');

// ★ ФИКС 3: при обновлении с токеном — не делаем автостарт,
// просто показываем лендинг. Пользователь нажмёт кнопку сам.
// Если хочешь автовход — раскомментируй строку ниже:
// if (token) startDiagnostic();
</script>
