<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>lab.chvrtk.ru — Диагностика английского</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        .hidden { display: none !important; }
        .glass { max-width: 800px; margin: 2rem auto; padding: 2rem; background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border-radius: 32px; border: 1px solid rgba(255,255,255,0.15); }
        .btn { background: #0047FF; border: none; padding: 12px 24px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; margin: 5px; }
        .btn-outline { background: transparent; border: 1px solid #0047FF; }
        .topic-score { margin: 15px 0; }
        .score-bar { height: 8px; background: #2c2c2c; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .score-fill { height: 100%; width: 0%; transition: width 0.4s ease; }
        .error-item { background: rgba(255, 50, 50, 0.1); border-left: 3px solid #ff4444; padding: 1rem; margin: 1rem 0; border-radius: 12px; }
        .training-item { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 1rem; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.1); }
        .auth-error { color: #ff5a5a; font-size: 0.8rem; text-align: center; margin-top: 8px; }
        .flex-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
    </style>
</head>
<body>
<div class="container" style="max-width: 800px; margin: 0 auto; padding: 1rem;">
    <!-- Лендинг (виден неавторизованным) -->
    <div id="landing-view" class="glass" style="text-align: center;">
        <h1>lab.chvrtk.ru</h1>
        <p>Диагностика английского + тренировка слабых тем</p>
        <input type="email" id="login-email" placeholder="Email" class="hr-input" style="width: 100%; padding: 12px; margin-bottom: 12px; background: rgba(0,0,0,0.5); border-radius: 24px; border: 1px solid #333; color: white;">
        <input type="password" id="login-password" placeholder="Пароль" class="hr-input" style="width: 100%; padding: 12px; margin-bottom: 12px; background: rgba(0,0,0,0.5); border-radius: 24px; border: 1px solid #333; color: white;">
        <div class="flex-buttons" style="justify-content: center;">
            <button class="btn" id="login-btn">Войти</button>
            <button class="btn btn-outline" id="register-btn">Зарегистрироваться</button>
        </div>
        <div id="auth-error" class="auth-error"></div>
        <button class="btn btn-outline" id="guest-train-btn" style="margin-top: 20px;">Попробовать тренировку (без регистрации)</button>
    </div>

    <!-- Тест -->
    <div id="test-view" class="glass hidden">
        <h2>Диагностический тест</h2>
        <div id="test-question"></div>
        <div id="test-options" style="margin: 20px 0;"></div>
        <button class="btn" id="test-next">Далее</button>
        <div id="test-progress" style="margin-top: 20px;"></div>
    </div>

    <!-- Результат -->
    <div id="result-view" class="glass hidden">
        <h2>Ваш результат</h2>
        <p><strong>Уровень: <span id="result-level"></span></strong></p>
        <div id="topic-scores"></div>
        <div class="flex-buttons">
            <button class="btn" id="train-btn">Тренировать слабые темы</button>
            <button class="btn btn-outline" id="retest-btn">Пройти тест заново</button>
            <button class="btn btn-outline" id="errors-btn">Ошибки</button>
            <button class="btn btn-outline" id="logout-btn">Выйти</button>
        </div>
    </div>

    <!-- Тренировка -->
    <div id="training-view" class="glass hidden">
        <h2>Тренировка</h2>
        <div id="training-list"></div>
        <button class="btn" id="submit-training">Проверить</button>
        <div id="training-result" style="margin-top: 20px;"></div>
        <button class="btn btn-outline" id="back-to-result">Назад</button>
    </div>

    <!-- Ошибки -->
    <div id="errors-view" class="glass hidden">
        <h2>Ошибки из последнего теста</h2>
        <div id="errors-list"></div>
        <button class="btn btn-outline" id="close-errors">Закрыть</button>
    </div>
</div>

<script>
    // ========== КОНФИГ ==========
    const API_BASE = 'https://d5d34ggl6saovpdajhps.a6hc9vya.apigw.yandexcloud.net';
    let token = localStorage.getItem('token');
    let currentQuestions = [];
    let currentAnswers = [];
    let currentQuestionIndex = 0;
    let trainingQuestions = [];
    let trainingAnswers = [];

    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    async function apiCall(endpoint, method, body = null, needAuth = true) {
        const headers = { 'Content-Type': 'application/json' };
        // ★ ФИКС: всегда берём свежий токен из localStorage
        const currentToken = localStorage.getItem('token');
        if (needAuth && currentToken) {
            headers['Authorization'] = `Bearer ${currentToken}`;
        }
        const res = await fetch(`${API_BASE}/${endpoint}`, { method, headers, body: body ? JSON.stringify(body) : undefined });
        if (res.status === 401) {
            logout();
            throw new Error('Сессия истекла, войдите снова');
        }
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Ошибка запроса');
        return data;
    }

    function logout() {
        localStorage.removeItem('token');
        token = null;
        // ★ ФИКС: нет location.reload(), просто показываем лендинг
        showView('landing');
        document.getElementById('login-email').value = '';
        document.getElementById('login-password').value = '';
        currentQuestions = [];
        currentAnswers = [];
        trainingQuestions = [];
        trainingAnswers = [];
    }

    function showView(viewName) {
        const views = ['landing', 'test', 'result', 'training', 'errors'];
        views.forEach(v => {
            const el = document.getElementById(`${v}-view`);
            if (el) el.classList.add('hidden');
        });
        document.getElementById(`${viewName}-view`).classList.remove('hidden');
    }

    // ========== ЛОГИН / РЕГИСТРАЦИЯ ==========
    document.getElementById('login-btn').onclick = async () => {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const errorDiv = document.getElementById('auth-error');
        if (!email || !password) {
            errorDiv.textContent = 'Заполните email и пароль';
            return;
        }
        try {
            const data = await apiCall('user-login', 'POST', { email, password }, false);
            token = data.token;
            localStorage.setItem('token', token);
            errorDiv.textContent = '';
            startDiagnostic();
        } catch (e) {
            errorDiv.textContent = 'Ошибка входа: ' + e.message;
        }
    };

    document.getElementById('register-btn').onclick = async () => {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const errorDiv = document.getElementById('auth-error');
        if (!email || !password) {
            errorDiv.textContent = 'Заполните email и пароль';
            return;
        }
        try {
            const data = await apiCall('register', 'POST', { email, password }, false);
            token = data.token;
            localStorage.setItem('token', token);
            errorDiv.textContent = '';
            startDiagnostic();
        } catch (e) {
            errorDiv.textContent = 'Ошибка регистрации: ' + e.message;
        }
    };

    document.getElementById('logout-btn').onclick = () => logout();

    // Гостевая тренировка (без токена)
    document.getElementById('guest-train-btn').onclick = async () => {
        try {
            const training = await apiCall('training?random=true', 'GET', null, false);
            trainingQuestions = training;
            trainingAnswers = [];
            renderTraining();
            showView('training');
        } catch (e) {
            alert('Тренировка недоступна: ' + e.message);
        }
    };

    // ========== ДИАГНОСТИЧЕСКИЙ ТЕСТ ==========
    async function startDiagnostic() {
        showView('test');
        try {
            currentQuestions = await apiCall('test', 'GET');
            // ★ ФИКС: если options — строка, превращаем в массив
            currentQuestions = currentQuestions.map(q => ({
                ...q,
                options: typeof q.options === 'string' ? JSON.parse(q.options) : (q.options || [])
            }));
            currentAnswers = [];
            currentQuestionIndex = 0;
            renderQuestion();
        } catch (e) {
            alert('Не удалось загрузить тест: ' + e.message);
            logout();
        }
    }

    function renderQuestion() {
        if (currentQuestionIndex >= currentQuestions.length) {
            submitTest();
            return;
        }
        const q = currentQuestions[currentQuestionIndex];
        if (!q || !q.options || !Array.isArray(q.options)) {
            console.error('Некорректный вопрос:', q);
            document.getElementById('test-question').innerHTML = '<p>Ошибка загрузки вопроса</p>';
            return;
        }
        document.getElementById('test-question').innerHTML = `<p><strong>${escapeHtml(q.topic_name)}</strong><br>${escapeHtml(q.text)}</p>`;
        const optsDiv = document.getElementById('test-options');
        optsDiv.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const letter = String.fromCharCode(65 + idx);
            const btn = document.createElement('button');
            btn.textContent = `${letter}. ${escapeHtml(opt)}`;
            btn.className = 'btn btn-outline';
            btn.style.margin = '8px 8px 0 0';
            btn.onclick = () => {
                currentAnswers.push({ question_id: q.id, user_answer: letter });
                currentQuestionIndex++;
                renderQuestion();
            };
            optsDiv.appendChild(btn);
        });
        document.getElementById('test-progress').innerHTML = `Вопрос ${currentQuestionIndex+1} из ${currentQuestions.length}`;
    }

    async function submitTest() {
        try {
            const result = await apiCall('submit', 'POST', { answers: currentAnswers });
            showResult(result);
        } catch (e) {
            alert('Ошибка отправки теста: ' + e.message);
        }
    }

    function showResult(res) {
        document.getElementById('result-level').innerText = res.level;
        const container = document.getElementById('topic-scores');
        container.innerHTML = '';
        for (const [topic, score] of Object.entries(res.topic_scores)) {
            const percent = Math.round(score * 100);
            const color = percent < 60 ? '#ff5555' : (percent < 80 ? '#ffaa44' : '#44ff44');
            container.innerHTML += `
                <div class="topic-score">
                    <span>${escapeHtml(topic)}: ${percent}%</span>
                    <div class="score-bar"><div class="score-fill" style="width:${percent}%; background:${color};"></div></div>
                </div>
            `;
        }
        showView('result');
    }

    // ========== ТРЕНИРОВКА ==========
    async function startTraining(randomMode = false) {
        try {
            const url = randomMode ? 'training?random=true' : 'training';
            const training = await apiCall(url, 'GET');
            trainingQuestions = training.map(q => ({
                ...q,
                options: typeof q.options === 'string' ? JSON.parse(q.options) : (q.options || [])
            }));
            trainingAnswers = [];
            renderTraining();
            showView('training');
        } catch (e) {
            alert('Не удалось загрузить тренировку: ' + e.message);
        }
    }

    function renderTraining() {
        const container = document.getElementById('training-list');
        container.innerHTML = '';
        trainingQuestions.forEach((q, idx) => {
            const div = document.createElement('div');
            div.className = 'training-item';
            div.innerHTML = `<p><strong>${escapeHtml(q.text)}</strong></p>`;
            const optsDiv = document.createElement('div');
            q.options.forEach((opt, optIdx) => {
                const letter = String.fromCharCode(65 + optIdx);
                const btn = document.createElement('button');
                btn.textContent = `${letter}. ${escapeHtml(opt)}`;
                btn.className = 'btn btn-outline';
                btn.style.margin = '5px';
                btn.onclick = () => {
                    if (!trainingAnswers[idx]) trainingAnswers[idx] = {};
                    trainingAnswers[idx] = { question_id: q.id, user_answer: letter };
                    optsDiv.querySelectorAll('button').forEach(b => b.style.background = 'transparent');
                    btn.style.background = '#0047FF';
                    btn.style.color = 'white';
                };
                optsDiv.appendChild(btn);
            });
            div.appendChild(optsDiv);
            container.appendChild(div);
        });
    }

    document.getElementById('submit-training').onclick = async () => {
        if (trainingAnswers.length !== trainingQuestions.length || trainingAnswers.some(a => !a)) {
            alert('Ответьте на все вопросы');
            return;
        }
        try {
            const res = await apiCall('training', 'POST', { answers: trainingAnswers });
            const correctCount = res.results.filter(r => r.correct).length;
            let html = `<p>✅ Правильно: ${correctCount} из ${res.results.length}</p>`;
            if (res.results[0]?.explanation) {
                html += '<div style="margin-top:15px;"><strong>Пояснения:</strong><ul>';
                res.results.forEach(r => {
                    html += `<li>${escapeHtml(r.explanation)}</li>`;
                });
                html += '</ul></div>';
            }
            document.getElementById('training-result').innerHTML = html;
        } catch (e) {
            alert('Ошибка проверки: ' + e.message);
        }
    };

    // ========== ОШИБКИ ==========
    async function showErrors() {
        try {
            const errors = await apiCall('errors', 'GET');
            const div = document.getElementById('errors-list');
            if (!errors.length) {
                div.innerHTML = '<p>✨ Нет ошибок! Отличная работа.</p>';
            } else {
                div.innerHTML = errors.map(e => `
                    <div class="error-item">
                        <strong>${escapeHtml(e.question_text)}</strong><br>
                        Ваш ответ: ${escapeHtml(e.user_answer)}<br>
                        Правильный ответ: ${escapeHtml(e.correct_answer_display)}
                    </div>
                `).join('');
            }
            showView('errors');
        } catch (e) {
            alert('Не удалось загрузить ошибки: ' + e.message);
        }
    }

    // ========== НАВИГАЦИЯ ==========
    document.getElementById('retest-btn').onclick = () => startDiagnostic();
    document.getElementById('train-btn').onclick = () => startTraining(false);
    document.getElementById('errors-btn').onclick = () => showErrors();
    document.getElementById('close-errors').onclick = () => showView('result');
    document.getElementById('back-to-result').onclick = () => showView('result');

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Если уже есть токен — сразу тест
    if (token) {
        startDiagnostic().catch(() => logout());
    } else {
        showView('landing');
    }
</script>
</body>
</html>
