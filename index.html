<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>lab.chvrtk.ru — диагностика английского</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: radial-gradient(circle at 30% 30%, #050505 0%, #000000 100%);
            color: white;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h1, h2 {
            font-weight: 600;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 { font-size: 2.2rem; }
        h2 { font-size: 1.6rem; margin-top: 0.5rem; }

        .btn {
            background: #0047FF;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin: 8px 8px 0 0;
            display: inline-block;
            font-size: 0.95rem;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #0047FF;
            color: #0047FF;
        }

        .btn-outline:hover {
            background: rgba(0, 71, 255, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .hr-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: white;
            font-size: 1rem;
            margin-bottom: 16px;
            transition: 0.2s;
        }

        .hr-input:focus {
            outline: none;
            border-color: #0047FF;
            background: rgba(0,0,0,0.7);
        }

        .topic-score {
            margin: 15px 0;
        }

        .score-bar {
            height: 8px;
            background: #2c2c2c;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        .score-fill {
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        .error-item {
            background: rgba(255, 50, 50, 0.1);
            border-left: 3px solid #ff4444;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 12px;
        }

        .training-item {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hidden {
            display: none;
        }

        .flex-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0 10px;
        }

        @media (max-width: 600px) {
            body { padding: 1rem; }
            .glass { padding: 1.5rem; }
            .btn { padding: 10px 18px; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Логин/регистрация -->
    <div id="login-view" class="glass">
        <h1>lab.chvrtk.ru</h1>
        <p style="opacity:0.8; margin-bottom: 1.5rem;">Диагностика английского + тренировка слабых тем</p>
        <input type="email" id="login-email" placeholder="Email" class="hr-input" autocomplete="email">
        <input type="password" id="login-password" placeholder="Пароль" class="hr-input" autocomplete="current-password">
        <div class="flex-buttons">
            <button class="btn" id="login-btn">Войти</button>
            <button class="btn btn-outline" id="register-btn">Зарегистрироваться</button>
        </div>
    </div>

    <!-- Экран теста -->
    <div id="test-view" class="glass hidden">
        <h2>Диагностический тест</h2>
        <div id="test-question"></div>
        <div id="test-options" style="margin: 20px 0;"></div>
        <button class="btn" id="test-next">Далее</button>
        <div id="test-progress" style="margin-top: 20px; font-size: 0.9rem; opacity:0.7;"></div>
        <button class="btn btn-outline" id="skip-test" style="margin-top: 20px;">Пропустить диагностику → тренировка</button>
    </div>

    <!-- Результат теста -->
    <div id="result-view" class="glass hidden">
        <h2>Ваш результат</h2>
        <p><strong>Уровень: <span id="result-level"></span></strong></p>
        <div id="topic-scores"></div>
        <div class="flex-buttons">
            <button class="btn" id="train-btn">Тренировать слабые темы</button>
            <button class="btn btn-outline" id="retest-btn">Пройти тест заново</button>
            <button class="btn btn-outline" id="errors-btn">Ошибки</button>
            <button class="btn btn-outline" id="skip-from-result">Тренировка (все темы)</button>
        </div>
    </div>

    <!-- Тренировка -->
    <div id="training-view" class="glass hidden">
        <h2>Тренировка</h2>
        <div id="training-list"></div>
        <button class="btn" id="submit-training">Проверить</button>
        <div id="training-result" style="margin-top: 20px;"></div>
        <button class="btn btn-outline" id="back-to-result">Назад</button>
    </div>

    <!-- Ошибки -->
    <div id="errors-view" class="glass hidden">
        <h2>Ошибки из последнего теста</h2>
        <div id="errors-list"></div>
        <button class="btn btn-outline" id="close-errors">Закрыть</button>
    </div>
</div>

<script>
    // ========== КОНФИГ ==========
    const API_BASE = 'https://d5d34ggl6saovpdajhps.a6hc9vya.apigw.yandexcloud.net';
    let token = localStorage.getItem('token');
    let currentQuestions = [];
    let currentAnswers = [];
    let currentQuestionIndex = 0;
    let trainingQuestions = [];
    let trainingAnswers = [];

    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    async function apiCall(endpoint, method, body = null, needAuth = true) {
        const headers = { 'Content-Type': 'application/json' };
        if (needAuth && token) headers['Authorization'] = `Bearer ${token}`;
        const res = await fetch(`${API_BASE}/${endpoint}`, {
            method,
            headers,
            body: body ? JSON.stringify(body) : undefined
        });
        if (res.status === 401) {
            logout();
            throw new Error('Сессия истекла, войдите снова');
        }
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Ошибка запроса');
        return data;
    }

    function logout() {
        localStorage.removeItem('token');
        token = null;
        showView('login');
    }

    function showView(viewName) {
        const views = ['login', 'test', 'result', 'training', 'errors'];
        views.forEach(v => {
            const el = document.getElementById(`${v}-view`);
            if (el) el.classList.add('hidden');
        });
        document.getElementById(`${viewName}-view`).classList.remove('hidden');
    }

    // ========== ЛОГИН / РЕГИСТРАЦИЯ ==========
    document.getElementById('login-btn').onclick = async () => {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        if (!email || !password) return alert('Заполните email и пароль');
        try {
            const data = await apiCall('user-login', 'POST', { email, password }, false);
            token = data.token;
            localStorage.setItem('token', token);
            startDiagnostic();
        } catch (e) {
            alert('Ошибка входа: ' + e.message);
        }
    };

    document.getElementById('register-btn').onclick = async () => {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        if (!email || !password) return alert('Заполните email и пароль');
        try {
            const data = await apiCall('register', 'POST', { email, password }, false);
            token = data.token;
            localStorage.setItem('token', token);
            startDiagnostic();
        } catch (e) {
            alert('Ошибка регистрации: ' + e.message);
        }
    };

    // ========== ДИАГНОСТИЧЕСКИЙ ТЕСТ ==========
    async function startDiagnostic() {
        showView('test');
        try {
            currentQuestions = await apiCall('test', 'GET');
            currentAnswers = [];
            currentQuestionIndex = 0;
            renderQuestion();
        } catch (e) {
            alert('Не удалось загрузить тест: ' + e.message);
            showView('login');
        }
    }

    function renderQuestion() {
        if (currentQuestionIndex >= currentQuestions.length) {
            submitTest();
            return;
        }
        const q = currentQuestions[currentQuestionIndex];
        document.getElementById('test-question').innerHTML = `<p><strong>${escapeHtml(q.topic_name)}</strong><br>${escapeHtml(q.text)}</p>`;
        const optsDiv = document.getElementById('test-options');
        optsDiv.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const letter = String.fromCharCode(65 + idx);
            const btn = document.createElement('button');
            btn.textContent = `${letter}. ${escapeHtml(opt)}`;
            btn.className = 'btn btn-outline';
            btn.style.margin = '8px 8px 0 0';
            btn.onclick = () => {
                currentAnswers.push({ question_id: q.id, user_answer: letter });
                currentQuestionIndex++;
                renderQuestion();
            };
            optsDiv.appendChild(btn);
        });
        document.getElementById('test-progress').innerHTML = `Вопрос ${currentQuestionIndex+1} из ${currentQuestions.length}`;
    }

    async function submitTest() {
        try {
            const result = await apiCall('submit', 'POST', { answers: currentAnswers });
            showResult(result);
        } catch (e) {
            alert('Ошибка отправки теста: ' + e.message);
        }
    }

    function showResult(res) {
        document.getElementById('result-level').innerText = res.level;
        const container = document.getElementById('topic-scores');
        container.innerHTML = '';
        for (const [topic, score] of Object.entries(res.topic_scores)) {
            const percent = Math.round(score * 100);
            const color = percent < 60 ? '#ff5555' : (percent < 80 ? '#ffaa44' : '#44ff44');
            container.innerHTML += `
                <div class="topic-score">
                    <span>${escapeHtml(topic)}: ${percent}%</span>
                    <div class="score-bar"><div class="score-fill" style="width:${percent}%; background:${color};"></div></div>
                </div>
            `;
        }
        showView('result');
    }

    // ========== ТРЕНИРОВКА ==========
    async function startTraining(randomMode = false) {
        try {
            const url = randomMode ? 'training?random=true' : 'training';
            const training = await apiCall(url, 'GET');
            trainingQuestions = training;
            trainingAnswers = [];
            renderTraining();
            showView('training');
        } catch (e) {
            alert('Не удалось загрузить тренировку: ' + e.message);
        }
    }

    function renderTraining() {
        const container = document.getElementById('training-list');
        container.innerHTML = '';
        trainingQuestions.forEach((q, idx) => {
            const div = document.createElement('div');
            div.className = 'training-item';
            div.innerHTML = `<p><strong>${escapeHtml(q.text)}</strong></p>`;
            const optsDiv = document.createElement('div');
            q.options.forEach((opt, optIdx) => {
                const letter = String.fromCharCode(65 + optIdx);
                const btn = document.createElement('button');
                btn.textContent = `${letter}. ${escapeHtml(opt)}`;
                btn.className = 'btn btn-outline';
                btn.style.margin = '5px';
                btn.onclick = () => {
                    if (!trainingAnswers[idx]) trainingAnswers[idx] = {};
                    trainingAnswers[idx] = { question_id: q.id, user_answer: letter };
                    // Визуально выделяем выбранный
                    optsDiv.querySelectorAll('button').forEach(b => b.style.background = 'transparent');
                    btn.style.background = '#0047FF';
                };
                optsDiv.appendChild(btn);
            });
            div.appendChild(optsDiv);
            container.appendChild(div);
        });
    }

    document.getElementById('submit-training').onclick = async () => {
        if (trainingAnswers.length !== trainingQuestions.length || trainingAnswers.some(a => !a)) {
            alert('Ответьте на все вопросы');
            return;
        }
        try {
            const res = await apiCall('training', 'POST', { answers: trainingAnswers });
            const correctCount = res.results.filter(r => r.correct).length;
            document.getElementById('training-result').innerHTML = `<p>✅ Правильно: ${correctCount} из ${res.results.length}</p>`;
        } catch (e) {
            alert('Ошибка проверки: ' + e.message);
        }
    };

    // ========== ОШИБКИ ==========
    async function showErrors() {
        try {
            const errors = await apiCall('errors', 'GET');
            const div = document.getElementById('errors-list');
            if (!errors.length) {
                div.innerHTML = '<p>✨ Нет ошибок! Отличная работа.</p>';
            } else {
                div.innerHTML = errors.map(e => `
                    <div class="error-item">
                        <strong>${escapeHtml(e.question_text)}</strong><br>
                        Ваш ответ: ${escapeHtml(e.user_answer)}<br>
                        Правильный ответ: ${escapeHtml(e.correct_answer_display)}
                    </div>
                `).join('');
            }
            showView('errors');
        } catch (e) {
            alert('Не удалось загрузить ошибки: ' + e.message);
        }
    }

    // ========== НАВИГАЦИЯ И УТИЛИТЫ ==========
    document.getElementById('retest-btn').onclick = () => startDiagnostic();
    document.getElementById('train-btn').onclick = () => startTraining(false);
    document.getElementById('skip-test').onclick = () => startTraining(true);
    document.getElementById('skip-from-result').onclick = () => startTraining(true);
    document.getElementById('errors-btn').onclick = () => showErrors();
    document.getElementById('close-errors').onclick = () => showView('result');
    document.getElementById('back-to-result').onclick = () => showView('result');

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Если уже есть токен — сразу тест
    if (token) {
        startDiagnostic().catch(() => showView('login'));
    } else {
        showView('login');
    }
</script>
</body>
</html>
